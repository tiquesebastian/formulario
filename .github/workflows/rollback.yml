name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        default: qa
        options:
          - qa
          - prod
      version:
        description: "Version tag/build to rollback"
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Trigger rollback webhook
        if: ${{ secrets.ROLLBACK_DEPLOY_WEBHOOK != '' }}
        run: |
          curl -X POST "${{ secrets.ROLLBACK_DEPLOY_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"environment":"${{ inputs.environment }}","version":"${{ inputs.version }}"}'

      - name: Warn when rollback webhook is missing
        if: ${{ secrets.ROLLBACK_DEPLOY_WEBHOOK == '' }}
        run: echo "ROLLBACK_DEPLOY_WEBHOOK is not configured yet."
